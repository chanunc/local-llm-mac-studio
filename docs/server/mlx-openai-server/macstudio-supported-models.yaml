# Repo-managed reference for the downloaded models currently supportable on
# this Mac Studio's mlx-openai-server install.
#
# Start with:
#   JANG_PATCH_ENABLED=1 ~/mlx-openai-server-env/bin/mlx-openai-server launch \
#     --config ~/mlx-openai-server-multimodel.yaml --no-log-file
#
# Then copy the model entries you want into ~/mlx-openai-server-multimodel.yaml.
#
# Included here:
# - Qwen3.5 JANG models: require qwen3_coder tool parsing + qwen3_5 reasoning parsing
# - Qwen3.5-27B-4bit: despite the name, this MLX conversion is a multimodal Qwen3.5 entry
# - Qwen3-Coder 30B: requires qwen3_coder tool parsing
# - Hermes 4 70B: requires hermes tool + reasoning parsing
# - Hermes 4.3 36B: Seed-OSS chat-only path with custom template
#
# Excluded here on purpose:
# - Nemotron family: use vllm-mlx instead on this repo
# - Mistral Small 4 JANG: not currently supportable on this mlx-openai-server stack

server:
  host: 0.0.0.0
  port: 8000

models:
  - model_path: /Users/chanunc/.omlx/models/JANGQ-AI--Qwen3.5-122B-A10B-JANG_2S
    model_type: lm
    served_model_name: JANGQ-AI/Qwen3.5-122B-A10B-JANG_2S
    enable_auto_tool_choice: true
    tool_call_parser: qwen3_coder
    reasoning_parser: qwen3_5
    context_length: 200000

  - model_path: /Users/chanunc/.omlx/models/JANGQ-AI--Qwen3.5-35B-A3B-JANG_4K
    model_type: lm
    served_model_name: JANGQ-AI/Qwen3.5-35B-A3B-JANG_4K
    enable_auto_tool_choice: true
    tool_call_parser: qwen3_coder
    reasoning_parser: qwen3_5
    context_length: 262144

  # This MLX conversion is Qwen3.5 multimodal despite the repo name omitting VL.
  - model_path: /Users/chanunc/.omlx/models/mlx-community--Qwen3.5-27B-4bit
    model_type: multimodal
    served_model_name: mlx-community/Qwen3.5-27B-4bit
    enable_auto_tool_choice: true
    tool_call_parser: qwen3_vl
    reasoning_parser: qwen3_vl
    context_length: 131072

  - model_path: /Users/chanunc/.omlx/models/mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit
    model_type: lm
    served_model_name: mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit
    enable_auto_tool_choice: true
    tool_call_parser: qwen3_coder
    context_length: 262144

  - model_path: /Users/chanunc/.omlx/models/lmstudio-community--Hermes-4-70B-MLX-6bit
    model_type: lm
    served_model_name: lmstudio-community/Hermes-4-70B-MLX-6bit
    enable_auto_tool_choice: true
    tool_call_parser: hermes
    reasoning_parser: hermes
    context_length: 131072

  # Seed-OSS-based compact Hermes. Works for basic chat on this stack when the
  # official Seed-OSS chat template is supplied. Tool calling and reasoning
  # parsing are not validated here because the current server build does not
  # expose a seed_oss parser.
  - model_path: /Users/chanunc/.omlx/models/alexcovo--Hermes-4.3-36B-mlx-4Bit
    model_type: lm
    served_model_name: alexcovo/Hermes-4.3-36B-mlx-4Bit
    trust_remote_code: true
    chat_template_file: /Users/chanunc/seed-oss-36b-chat-template.jinja
    context_length: 131072

  # Medium-confidence multimodal entry. Keep only if you intend to serve VLMs
  # from this stack and have verified image inputs locally.
  - model_path: /Users/chanunc/.omlx/models/dealignai--Qwen3.5-VL-122B-A10B-4bit-MLX-CRACK
    model_type: multimodal
    served_model_name: dealignai/Qwen3.5-VL-122B-A10B-4bit-MLX-CRACK
    enable_auto_tool_choice: true
    tool_call_parser: qwen3_coder
    reasoning_parser: qwen3_vl
    context_length: 131072
